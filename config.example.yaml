# Kafka Topic Forward 配置示例
# 从源 Kafka topic 消费消息并转发到目标 Kafka topic

# 源 Kafka 配置
source:
  brokers:
    - "source-kafka-1.example.com:9092"
    - "source-kafka-2.example.com:9092"
  topic: "source-topic-name"
  group_id: "kafka-topic-forward-group"

  # 认证配置（可选）
  auth:
    # 认证机制：plain, scram-sha-256, scram-sha-512
    mechanism: "scram-sha-256"
    username: "source_user"
    password: "source_password"

  # TLS 配置（可选）
  tls:
    enable: true
    ca_cert_file: "/path/to/ca-cert.pem"

# 目标 Kafka 配置
dest:
  brokers:
    - "dest-kafka-1.example.com:9092"
    - "dest-kafka-2.example.com:9092"
  topic: "dest-topic-name"

  # 认证配置（可选）
  auth:
    mechanism: "scram-sha-256"
    username: "dest_user"
    password: "dest_password"

  # TLS 配置（可选）
  tls:
    enable: true
    ca_cert_file: "/path/to/ca-cert.pem"

# 转发配置
forward:
  # 从最早的消息开始消费（false 则从最新开始）
  start_from_earliest: true

  # 单次拉取最小字节数（默认 1）
  min_bytes: 1

  # 单次拉取最大字节数（默认 10MB）
  max_bytes: 10485760

  # 批量发送大小（消息条数）
  batch_size: 100

  # 批量发送超时
  batch_timeout: 1s

# 限速配置（可选）
rate_limit:
  enabled: true
  messages_per_second: 1000
  bytes_per_second: 10485760  # 10MB/s
  burst: 100
